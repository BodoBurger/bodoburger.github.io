# Project Information
site_name: Bodo's site
site_description: my personal website for data and tech stuff
site_url: https://bodoburger.github.io/
site_author: Bodo Burger

# Repository
repo_name: BodoBurger/bodoburger.github.io
repo_url: https://github.com/BodoBurger/bodoburger.github.io

# Copyright
copyright: Copyright &copy; 2025 Bodo Burger

# Configuration
theme:
  name: material
  custom_dir: overrides
  features:
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - navigation.indexes
    - navigation.path
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - navigation.tracking
  font:
    text: Roboto
    code: Roboto Mono
#  favicon: assets/favicon.png
  icon:
    logo: material/home-city

# Plugins
plugins:
  - search
  - blog
  - meta

# Extra settings
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/BodoBurger
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/bodo-burger/
    - icon: custom/pride
      link: https://www.thehrcfoundation.org/

# Custom CSS
extra_css:
  - assets/stylesheets/custom.css

# Extensions
markdown_extensions: 
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji

not_in_nav: |
  /index.md

# Page tree
nav:
#- Home: index.md
- About: about.md
- Notes:
  - notes/index.md
  - Data science concepts:
    - Big data: notes/data_science/big_data.md
    - SQL recipes: notes/data_science/sql_recipes.md
  - Tools:
    - Conda: notes/tools/conda.md
    - Git: notes/tools/git.md
    - SSH: notes/tools/ssh.md
    - Ubuntu: notes/tools/ubuntu.md
    - VS Code: notes/tools/vs_code.md
  - Cloud services:
    - notes/cloud/index.md
    - AWS: notes/cloud/aws.md
- Notebooks:
  - "notebooks/"
- Contact: contact.md
